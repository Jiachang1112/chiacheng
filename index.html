<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#f2f2f7">
    <title>嘉成的專屬網站統整</title>
    <style>
        /* iOS 全局設定 */
        body {
            /* 強制使用蘋果系統字體 */
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            background-color: #f2f2f7; /* iOS 經典淺灰背景 */
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: #1c1c1e;
            padding: 40px 20px;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        /* 頭部個人資訊 */
        .profile-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .profile-avatar {
            width: 96px;
            height: 96px;
            background: #ffffff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 12px auto;
            box-shadow: 0 4px 14px rgba(0,0,0,0.06);
            /* 如果你有自己的頭貼，可以把上面清空，換成下面這行 */
            /* background-image: url('你的圖片網址'); background-size: cover; */
        }

        .profile-header h1 {
            margin: 0;
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -0.4px;
        }

        .profile-header p {
            margin: 4px 0 0 0;
            color: #8e8e93; /* iOS 次要文字顏色 */
            font-size: 15px;
        }

        /* 連結清單容器 */
        .links-container {
            width: 100%;
            max-width: 420px; /* 模擬手機螢幕寬度 */
            display: flex;
            flex-direction: column;
            gap: 12px; /* 卡片之間的間距 */
        }

        /* iOS 風格圓角卡片 */
        .link-card {
            background: #ffffff;
            padding: 16px 20px;
            border-radius: 16px; /* 蘋果愛用的大圓角 */
            text-decoration: none;
            color: #1c1c1e;
            display: flex;
            align-items: center;
            transition: background-color 0.2s ease, transform 0.1s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02); /* 極淡的陰影，增加立體感 */
        }

        /* 按下去的回饋感 */
        .link-card:active {
            background-color: #e5e5ea;
            transform: scale(0.98);
        }

        /* 左側的小圖示區塊 (類似 App Icon) */
        .link-icon-wrapper {
            width: 36px;
            height: 36px;
            border-radius: 8px; /* App Icon 圓角 */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-right: 16px;
            background-color: #f2f2f7;
        }

        /* 標題文字 */
        .link-title {
            font-size: 17px;
            font-weight: 500;
            flex-grow: 1;
        }

        /* 右側的 iOS 箭頭 (Chevron) */
        .link-arrow {
            color: #c7c7cc;
            display: flex;
            align-items: center;
        }

        .link-arrow svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        /* 底部版權宣告 */
        .footer {
            margin-top: 40px;
            font-size: 13px;
            color: #8e8e93;
        }
    </style>
</head>
<body>

    <div class="profile-header">
        <div class="profile-avatar">👨🏻‍💻</div>
        <h1>嘉成</h1>
        <p>作品集與實用工具統整</p>
    </div>

    <div class="links-container" id="links-container">
        <!-- 資料會從 Firebase 動態載入 -->
        <p style="text-align: center; color: #8e8e93; font-size: 15px;">載入中...</p>
    </div>

    <div class="footer">
        &copy; 2026 嘉成
    </div>

    <!-- Firebase 邏輯區塊 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 你的 Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAxObm0QEV7Zk9rMI6SbsCRXHKc765YxIk",
            authDomain: "chiacheng-3f785.firebaseapp.com",
            projectId: "chiacheng-3f785",
            storageBucket: "chiacheng-3f785.firebasestorage.app",
            messagingSenderId: "557068915414",
            appId: "1:557068915414:web:a9ab0209daa743487def77",
            measurementId: "G-CV97Q9XXTC"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 分配圖示顏色的陣列 (讓畫面看起來更繽紛，像真的 App)
        const colors = [
            { bg: '#e0f2fe', text: '🔧' }, // 淺藍工具
            { bg: '#fce7f3', text: '✨' }, // 粉紅 AI
            { bg: '#dcfce7', text: '🏠' }, // 淺綠家庭
            { bg: '#fef08a', text: '⚡' }, // 黃色
            { bg: '#e5e7eb', text: '🌐' }  // 灰色預設
        ];

        async function loadLinks() {
            const container = document.getElementById('links-container');
            
            try {
                const q = query(collection(db, "links"), orderBy("createdAt", "desc"));
                const querySnapshot = await getDocs(q);
                
                container.innerHTML = '';
                
                if (querySnapshot.empty) {
                    container.innerHTML = '<p style="text-align: center; color: #8e8e93; font-size: 15px;">尚無任何連結。<br><a href="/admin.html" style="color:#007aff; text-decoration:none;">前往新增</a></p>';
                    return;
                }

                let colorIndex = 0;

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const a = document.createElement('a');
                    a.href = data.url;
                    a.className = 'link-card';
                    a.target = '_blank';
                    
                    // 根據順序循環分配背景顏色和圖示
                    const currentStyle = colors[colorIndex % colors.length];
                    
                    // iOS 的經典向右箭頭 SVG
                    const chevronSvg = `<svg viewBox="0 0 24 24"><path d="M8.59,16.58L13.17,12L8.59,7.41L10,6L16,12L10,18L8.59,16.58Z" /></svg>`;

                    a.innerHTML = `
                        <div class="link-icon-wrapper" style="background-color: ${currentStyle.bg};">
                            ${currentStyle.text}
                        </div>
                        <div class="link-title">${data.title}</div>
                        <div class="link-arrow">${chevronSvg}</div>
                    `;
                    container.appendChild(a);
                    colorIndex++;
                });
            } catch (error) {
                console.error("載入失敗:", error);
                container.innerHTML = `<p style="text-align: center; color: #ff3b30;">載入失敗，請檢查設定。</p>`;
            }
        }

        loadLinks();
    </script>
</body>
</html>
