<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>嘉成的專屬網站統整</title>
    <style>
        /* 全局設定 */
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            background-color: #f9fafb;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: #1f2937;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        /* 頭部個人資訊區塊 */
        .profile-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            background-color: #3b82f6;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: bold;
            margin: 0 auto 16px auto;
            box-shadow: 0 4px 10px rgba(59, 130, 246, 0.3);
        }

        .profile-header h1 {
            margin: 0;
            font-size: 24px;
            color: #111827;
        }

        .profile-header p {
            margin: 8px 0 0 0;
            color: #6b7280;
            font-size: 15px;
        }

        /* 連結卡片容器 */
        .links-container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* 單一連結卡片設計 */
        .link-card {
            background: #ffffff;
            padding: 18px 24px;
            border-radius: 12px;
            text-decoration: none;
            color: #374151;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #f3f4f6;
        }

        .link-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 15px rgba(0,0,0,0.1);
            border-color: #d1d5db;
        }

        .link-title {
            font-size: 16px;
            font-weight: 600;
        }

        .link-arrow {
            color: #9ca3af;
            font-size: 18px;
            transition: transform 0.2s;
        }

        .link-card:hover .link-arrow {
            transform: translateX(4px) translateY(-4px);
            color: #3b82f6;
        }

        /* 底部版權宣告 */
        .footer {
            margin-top: auto;
            padding-top: 40px;
            font-size: 13px;
            color: #9ca3af;
        }
    </style>
</head>
<body>

    <div class="profile-header">
        <div class="profile-avatar">C</div>
        <h1>Chia-cheng</h1>
        <p>歡迎來到我的個人網站與專案統整</p>
    </div>

    <div class="links-container" id="links-container">
        <!-- 資料會從 Firebase 動態載入到這裡 -->
        <p style="text-align: center; color: #6b7280;">資料載入中...</p>
    </div>

    <div class="footer">
        &copy; 2026 Chia-cheng. All rights reserved.
    </div>

    <!-- Firebase 邏輯區塊 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 你專屬的真實 Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAxObm0QEV7Zk9rMI6SbsCRXHKc765YxIk",
            authDomain: "chiacheng-3f785.firebaseapp.com",
            projectId: "chiacheng-3f785",
            storageBucket: "chiacheng-3f785.firebasestorage.app",
            messagingSenderId: "557068915414",
            appId: "1:557068915414:web:a9ab0209daa743487def77",
            measurementId: "G-CV97Q9XXTC"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 讀取資料並產生 HTML 卡片的函數
        async function loadLinks() {
            const container = document.getElementById('links-container');
            
            try {
                // 查詢資料，並依照建立時間 (createdAt) 遞減排序 (最新的在最上面)
                const q = query(collection(db, "links"), orderBy("createdAt", "desc"));
                const querySnapshot = await getDocs(q);
                
                container.innerHTML = ''; // 清空原本的「載入中...」字樣
                
                if (querySnapshot.empty) {
                    container.innerHTML = '<p style="text-align: center; color: #6b7280;">目前還沒有新增任何連結喔！<br>請前往 <a href="/admin.html" style="color:#3b82f6;">後台</a> 新增。</p>';
                    return;
                }

                // 將抓到的每一筆資料做成卡片
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const a = document.createElement('a');
                    a.href = data.url;
                    a.className = 'link-card';
                    a.target = '_blank'; // 開啟新分頁
                    
                    a.innerHTML = `
                        <span class="link-title">${data.title}</span>
                        <span class="link-arrow">↗</span>
                    `;
                    container.appendChild(a);
                });
            } catch (error) {
                console.error("載入失敗:", error);
                // 有可能因為 createdAt 還沒有建立索引而報錯，這裡會顯示錯誤訊息
                container.innerHTML = `<p style="text-align: center; color: #ef4444;">資料讀取失敗，請確認 API 金鑰限制是否設定正確。</p>`;
            }
        }

        // 執行載入
        loadLinks();
    </script>
</body>
</html>
